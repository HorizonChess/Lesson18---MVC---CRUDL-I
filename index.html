<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/book.css">
    <title>Book Shop</title>
</head>

<body onload="onInit()">
    <h1>Book Shop</h1>

    <button class="addbook" onclick="onAddBook()">Add Book</button>

    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Price</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody class="books-table-body">
        </tbody>
    </table>

    <div class="book-details-modal hidden">
        <div class="modal-content">
            <button class="close-btn" onclick="onCloseModal()">✕</button>
            <pre class="book-details-text"></pre>
        </div>
    </div>

    <script src="js/services/book.service.js"></script>
    <script src="js/book.controller.js"></script>
</body>

</html>
