<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/book.css">
    <title>Book Shop</title>
</head>

<body onload="onInit()">
    <h1>Book Shop</h1>
    <div class="search-section">
        <input type="text" class="search-input" placeholder="Search books by title..." oninput="onFilterBooks()">
        <button class="clear-btn" onclick="onClearFilter()">Clear</button>
    </div>

    <button class="addbook" onclick="onAddBook()">Add Book</button>

    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Price</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody class="books-table-body">
        </tbody>
    </table>

    <dialog class="book-details-modal">
        <button class="close-btn" onclick="onCloseModal()">x</button>
        <div class="modal-body">
            <img class="book-cover" src="" alt="Book cover">
            <div class="book-info">
                <h2 class="book-title"></h2>
                <p class="book-price"></p>
                <p class="book-description"></p>
            </div>
        </div>
    </dialog>

    <dialog class="confirm-msg">

    </dialog>

    <script src="js/services/util.service.js"></script>
    <script src="js/services/book.service.js"></script>
    <script src="js/book.controller.js"></script>
</body>

</html>
